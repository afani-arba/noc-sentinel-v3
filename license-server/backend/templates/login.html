<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NOC Sentinel License Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96 border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">License Admin</h2>
        <form onsubmit="event.preventDefault(); window.location.href='/dashboard';">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-sm focus:outline-none focus:border-blue-500" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-sm focus:outline-none focus:border-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 rounded transition-colors">
                Login
            </button>
        </form>
    </div>
</body>
</html>
